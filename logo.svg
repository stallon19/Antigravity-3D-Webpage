<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#8B00FF"/>
    </linearGradient>
  </defs>
  <rect width="240" height="60" fill="#030308"/>
  <!-- Particle dots -->
  <circle cx="20" cy="15" r="1.5" fill="#00D4FF" opacity="0.5"/>
  <circle cx="35" cy="45" r="1" fill="#00D4FF" opacity="0.4"/>
  <circle cx="200" cy="20" r="1.5" fill="#8B00FF" opacity="0.5"/>
  <circle cx="215" cy="48" r="1" fill="#00D4FF" opacity="0.3"/>
  <!-- Lines -->
  <line x1="20" y1="15" x2="35" y2="45" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>
  <!-- Logo text -->
  <text x="50" y="37" font-family="Orbitron, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="#ffffff" filter="url(#glow)">ANTI</text>
  <text x="116" y="37" font-family="Orbitron, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="3" fill="#00D4FF" filter="url(#glow)">GRAVITY</text>
  <!-- Tagline -->
  <text x="50" y="52" font-family="'Exo 2', Arial, sans-serif" font-size="7" letter-spacing="3" fill="rgba(255,255,255,0.4)">3D ANIMATED HTML5 TEMPLATE</text>
</svg>
