<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#070720"/>
      <stop offset="100%" style="stop-color:#030308"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139,0,255,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="50%" style="stop-color:#8B00FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glowLeft)" opacity="0.8"/>
  <rect width="1200" height="630" fill="url(#glowRight)" opacity="0.8"/>

  <!-- Particle dots -->
  <circle cx="80" cy="100" r="2" fill="#00D4FF" opacity="0.5"/>
  <circle cx="150" cy="300" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="220" cy="500" r="2" fill="#8B00FF" opacity="0.4"/>
  <circle cx="320" cy="150" r="1" fill="#00D4FF" opacity="0.4"/>
  <circle cx="980" cy="120" r="2" fill="#00D4FF" opacity="0.5"/>
  <circle cx="1050" cy="400" r="1.5" fill="#8B00FF" opacity="0.4"/>
  <circle cx="1100" cy="220" r="1" fill="#00D4FF" opacity="0.3"/>
  <circle cx="900" cy="550" r="2" fill="#00D4FF" opacity="0.4"/>
  <circle cx="450" cy="80" r="1.5" fill="#8B00FF" opacity="0.3"/>
  <circle cx="750" cy="580" r="1" fill="#00D4FF" opacity="0.4"/>

  <!-- Connection lines -->
  <line x1="80" y1="100" x2="150" y2="300" stroke="#00D4FF" stroke-width="0.8" opacity="0.15"/>
  <line x1="150" y1="300" x2="220" y2="500" stroke="#00D4FF" stroke-width="0.8" opacity="0.12"/>
  <line x1="980" y1="120" x2="1050" y2="400" stroke="#00D4FF" stroke-width="0.8" opacity="0.15"/>
  <line x1="1050" y1="400" x2="900" y2="550" stroke="#8B00FF" stroke-width="0.8" opacity="0.12"/>

  <!-- Wireframe cube (top right) -->
  <g transform="translate(1060,100)" opacity="0.5">
    <rect x="-30" y="-30" width="60" height="60" fill="none" stroke="#00D4FF" stroke-width="1"/>
    <rect x="-18" y="-18" width="60" height="60" fill="none" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
    <line x1="-30" y1="-30" x2="-18" y2="-18" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
    <line x1="30" y1="-30" x2="42" y2="-18" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
    <line x1="30" y1="30" x2="42" y2="42" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
    <line x1="-30" y1="30" x2="-18" y2="42" stroke="#00D4FF" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Ring shape (bottom left) -->
  <ellipse cx="140" cy="480" rx="55" ry="20" fill="none" stroke="#8B00FF" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="140" cy="480" rx="40" ry="14" fill="none" stroke="#8B00FF" stroke-width="0.8" opacity="0.3"/>

  <!-- Top tagline -->
  <text x="600" y="130" font-family="Orbitron, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="8" fill="#00D4FF" text-anchor="middle" opacity="0.8" filter="url(#textGlow)">PREMIUM HTML5 TEMPLATE — VERSION 1.0</text>

  <!-- Main headline ANTI -->
  <text x="600" y="255" font-family="Orbitron, Arial, sans-serif" font-size="110" font-weight="900" letter-spacing="8" fill="#FFFFFF" text-anchor="middle" filter="url(#textGlow)">ANTI</text>

  <!-- Main headline GRAVITY with glow -->
  <text x="600" y="375" font-family="Orbitron, Arial, sans-serif" font-size="110" font-weight="900" letter-spacing="6" fill="#00D4FF" text-anchor="middle" filter="url(softGlow)" opacity="0.3">GRAVITY</text>
  <text x="600" y="375" font-family="Orbitron, Arial, sans-serif" font-size="110" font-weight="900" letter-spacing="6" fill="#00D4FF" text-anchor="middle" filter="url(textGlow)">GRAVITY</text>

  <!-- Subheading -->
  <text x="600" y="435" font-family="'Exo 2', Arial, sans-serif" font-size="16" font-weight="300" letter-spacing="5" fill="rgba(255,255,255,0.55)" text-anchor="middle">A PREMIUM 3D ANIMATED HTML5 TEMPLATE BUILT FOR THE FUTURE</text>

  <!-- Gradient divider line -->
  <rect x="400" y="455" width="400" height="1" fill="url(#borderGrad)" opacity="0.6"/>

  <!-- Bottom tags row -->
  <g transform="translate(600,490)">
    <!-- Tag 1 -->
    <rect x="-270" y="-14" width="110" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="-215" y="4" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#00D4FF" text-anchor="middle">⚡ ANIMATED</text>
    <!-- Tag 2 -->
    <rect x="-148" y="-14" width="90" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="-103" y="4" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#00D4FF" text-anchor="middle">🌐 3D CSS</text>
    <!-- Tag 3 -->
    <rect x="-46" y="-14" width="110" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="9" y="4" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#00D4FF" text-anchor="middle">📱 RESPONSIVE</text>
    <!-- Tag 4 -->
    <rect x="76" y="-14" width="100" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="126" y="4" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#00D4FF" text-anchor="middle">🎨 THEMEABLE</text>
    <!-- Tag 5 -->
    <rect x="188" y="-14" width="90" height="28" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="233" y="4" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#00D4FF" text-anchor="middle">🚀 FAST</text>
  </g>

  <!-- Footer text -->
  <text x="600" y="580" font-family="'Exo 2', Arial, sans-serif" font-size="12" letter-spacing="3" fill="rgba(255,255,255,0.25)" text-anchor="middle">CRAFTED FOR CODESTER · PURE CSS + VANILLA JS · NO FRAMEWORKS</text>

  <!-- Top glow border -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#borderGrad)" opacity="0.7"/>
  <rect x="0" y="628" width="1200" height="2" fill="url(#borderGrad)" opacity="0.7"/>
</svg>
