<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="sb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#070712"/>
      <stop offset="25%" style="stop-color:#070712"/>
      <stop offset="25.1%" style="stop-color:#030308"/>
      <stop offset="100%" style="stop-color:#030308"/>
    </linearGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background split: sidebar + content -->
  <rect width="1200" height="700" fill="url(#sb)"/>

  <!-- Sidebar border -->
  <rect x="299" y="0" width="1" height="700" fill="rgba(0,212,255,0.2)"/>

  <!-- Sidebar top -->
  <text x="28" y="52" font-family="Orbitron, Arial, sans-serif" font-size="16" font-weight="900" letter-spacing="2" fill="#FFFFFF">ANTI<tspan fill="#00D4FF">GRAVITY</tspan></text>
  <text x="28" y="70" font-family="'Exo 2', Arial, sans-serif" font-size="9" letter-spacing="2" fill="rgba(255,255,255,0.3)">Documentation v1.0</text>
  <line x1="0" y1="82" x2="300" y2="82" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

  <!-- Sidebar nav groups -->
  <text x="28" y="108" font-family="'Exo 2', Arial, sans-serif" font-size="9" letter-spacing="3" fill="rgba(255,255,255,0.25)">GETTING STARTED</text>
  
  <!-- Active link highlight -->
  <rect x="0" y="115" width="299" height="34" fill="rgba(0,212,255,0.05)"/>
  <rect x="0" y="115" width="3" height="34" fill="#00D4FF"/>
  <text x="24" y="137" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="#00D4FF">Introduction</text>
  
  <text x="20" y="168" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Features</text>
  <text x="20" y="200" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Folder Structure</text>
  <text x="20" y="232" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Installation</text>

  <text x="28" y="268" font-family="'Exo 2', Arial, sans-serif" font-size="9" letter-spacing="3" fill="rgba(255,255,255,0.25)">CUSTOMIZATION</text>
  <text x="20" y="296" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Customization Guide</text>
  <text x="20" y="328" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Libraries Used</text>

  <text x="28" y="364" font-family="'Exo 2', Arial, sans-serif" font-size="9" letter-spacing="3" fill="rgba(255,255,255,0.25)">REFERENCE</text>
  <text x="20" y="392" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Browser Support</text>
  <text x="20" y="424" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Support</text>

  <!-- Top bar in content area -->
  <rect x="300" y="0" width="900" height="50" fill="rgba(7,7,18,0.95)"/>
  <line x1="300" y1="50" x2="1200" y2="50" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="340" y="31" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">AntiGravity Template — v1.0 Documentation</text>
  <!-- Back button -->
  <rect x="1080" y="10" width="100" height="28" rx="4" fill="transparent" stroke="rgba(0,212,255,0.5)" stroke-width="1"/>
  <text x="1130" y="28" font-family="Orbitron, Arial, sans-serif" font-size="8" letter-spacing="1" fill="#00D4FF" text-anchor="middle">← BACK</text>

  <!-- Section heading with colored bar -->
  <rect x="340" y="80" width="4" height="36" fill="#00D4FF" rx="2"/>
  <rect x="344" y="90" width="4" height="16" fill="#8B00FF" rx="2" opacity="0.8"/>
  <text x="362" y="110" font-family="Orbitron, Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="2" fill="#FFFFFF" filter="url(#gw)">INTRODUCTION</text>

  <line x1="340" y1="126" x2="900" y2="126" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

  <!-- Body text -->
  <text x="340" y="155" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" xml:space="preserve">AntiGravity is a premium, production-ready HTML5 landing page template designed for</text>
  <text x="340" y="175" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">developers, designers, startups, and digital agencies who want to make an unforgettable</text>
  <text x="340" y="195" font-family="'Exo 2', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">first impression.</text>

  <!-- Sub heading -->
  <text x="340" y="240" font-family="Orbitron, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1" fill="#00D4FF">WHAT'S INCLUDED?</text>

  <!-- List items -->
  <circle cx="350" cy="267" r="3" fill="#00D4FF" opacity="0.8"/>
  <text x="365" y="272" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">index.html — Main landing page (6 fully designed sections)</text>
  <circle cx="350" cy="295" r="3" fill="#00D4FF" opacity="0.8"/>
  <text x="365" y="300" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">assets/css/style.css — Complete stylesheet with CSS variables</text>
  <circle cx="350" cy="323" r="3" fill="#8B00FF" opacity="0.8"/>
  <text x="365" y="328" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">assets/js/main.js — 7 JavaScript modules</text>
  <circle cx="350" cy="351" r="3" fill="#8B00FF" opacity="0.8"/>
  <text x="365" y="356" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">documentation/index.html — This documentation page</text>
  <circle cx="350" cy="379" r="3" fill="#00D4FF" opacity="0.8"/>
  <text x="365" y="384" font-family="'Exo 2', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">README.txt — Quick start guide + license info</text>

  <!-- Code block -->
  <rect x="340" y="410" width="820" height="130" rx="8" fill="rgba(0,0,0,0.6)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <!-- Copy btn -->
  <rect x="1100" y="420" width="50" height="22" rx="3" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="1125" y="434" font-family="'Exo 2', Arial, sans-serif" font-size="9" letter-spacing="1" fill="rgba(255,255,255,0.6)" text-anchor="middle">COPY</text>
  <!-- Code content -->
  <text x="364" y="440" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.3)"># Quick Start</text>
  <text x="364" y="460" font-family="Courier New, monospace" font-size="12" fill="#98e07f">1. Unzip</text>
  <text x="420" y="460" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.5)"> the downloaded package</text>
  <text x="364" y="480" font-family="Courier New, monospace" font-size="12" fill="#98e07f">2. Open</text>
  <text x="427" y="480" font-family="Courier New, monospace" font-size="12" fill="#a8d8f0"> index.html</text>
  <text x="510" y="480" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.5)"> in browser</text>
  <text x="364" y="500" font-family="Courier New, monospace" font-size="12" fill="#98e07f">3. Customize</text>
  <text x="460" y="500" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.5)"> CSS variables in </text>
  <text x="627" y="500" font-family="Courier New, monospace" font-size="12" fill="#a8d8f0">style.css</text>
  <text x="700" y="500" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.5)"> :root block</text>
  <text x="364" y="525" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.25)"># Done — no build step, no npm install required!</text>
</svg>
