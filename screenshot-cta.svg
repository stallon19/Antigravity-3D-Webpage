<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#0a0a20"/>
      <stop offset="100%" style="stop-color:#070712"/>
    </radialGradient>
    <radialGradient id="gLeft" cx="20%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139,0,255,0.18)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="gRight" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.18)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <filter id="gw">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gw2">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="50%" style="stop-color:#8B00FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#gLeft)"/>
  <rect width="1200" height="675" fill="url(#gRight)"/>

  <!-- Particles -->
  <circle cx="100" cy="120" r="2" fill="#00D4FF" opacity="0.4"/>
  <circle cx="250" cy="300" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="900" cy="150" r="2" fill="#8B00FF" opacity="0.4"/>
  <circle cx="1100" cy="400" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <circle cx="1050" cy="600" r="2" fill="#8B00FF" opacity="0.35"/>
  <circle cx="180" cy="550" r="1.5" fill="#00D4FF" opacity="0.3"/>
  <line x1="100" y1="120" x2="250" y2="300" stroke="#00D4FF" stroke-width="0.8" opacity="0.12"/>
  <line x1="900" y1="150" x2="1100" y2="400" stroke="#8B00FF" stroke-width="0.8" opacity="0.12"/>

  <!-- Section label -->
  <text x="600" y="130" font-family="Orbitron, Arial, sans-serif" font-size="11" letter-spacing="7" fill="#00D4FF" text-anchor="middle" opacity="0.8">PRICING</text>

  <!-- Main headline -->
  <text x="600" y="240" font-family="Orbitron, Arial, sans-serif" font-size="90" font-weight="900" letter-spacing="4" fill="#FFFFFF" text-anchor="middle" filter="url(#gw)">READY TO</text>
  <text x="600" y="340" font-family="Orbitron, Arial, sans-serif" font-size="90" font-weight="900" letter-spacing="4" fill="#FFFFFF" text-anchor="middle" filter="url(#gw)">LAUNCH?</text>

  <!-- Subtext -->
  <text x="600" y="390" font-family="'Exo 2', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">Get the AntiGravity template today and ship something extraordinary.</text>
  <text x="600" y="412" font-family="'Exo 2', Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" text-anchor="middle">One-time purchase · Lifetime updates · Full source code</text>

  <!-- Price Badge pill -->
  <!-- Outer glow border -->
  <rect x="470" y="440" width="260" height="52" rx="26" fill="none" stroke="url(#bGrad)" stroke-width="2.5"/>
  <!-- Inner bg -->
  <rect x="472" y="442" width="256" height="48" rx="24" fill="rgba(7,7,18,0.9)"/>
  <!-- Price text -->
  <text x="560" y="472" font-family="Orbitron, Arial, sans-serif" font-size="22" font-weight="900" fill="#00D4FF" text-anchor="middle" filter="url(#gw)">$19</text>
  <text x="640" y="472" font-family="Orbitron, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">ONE-TIME</text>

  <!-- Buttons -->
  <!-- Primary button -->
  <rect x="340" y="520" width="230" height="52" rx="4" fill="#00D4FF"/>
  <rect x="340" y="520" width="230" height="52" rx="4" fill="rgba(255,255,255,0.08)"/>
  <text x="455" y="550" font-family="Orbitron, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#030308" text-anchor="middle">BUY ON CODESTER</text>

  <!-- Ghost button -->
  <rect x="590" y="520" width="200" height="52" rx="4" fill="transparent" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="690" y="550" font-family="Orbitron, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">PREVIEW DEMO</text>

  <!-- Glow beneath buttons -->
  <ellipse cx="455" cy="596" rx="100" ry="12" fill="rgba(0,212,255,0.12)"/>

  <!-- Bottom info text -->
  <text x="600" y="640" font-family="'Exo 2', Arial, sans-serif" font-size="11" letter-spacing="2" fill="rgba(255,255,255,0.2)" text-anchor="middle">REGULAR CODESTER LICENSE · ALL MODERN BROWSERS SUPPORTED</text>
</svg>
